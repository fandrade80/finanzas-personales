<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finanzas — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:2rem 2.5rem;width:100%;max-width:360px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
h1{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:6px}
.sub{font-size:13px;color:#888;margin-bottom:1.75rem}
label{display:block;font-size:12px;font-weight:500;color:#555;margin-bottom:5px}
input[type=text],input[type=password]{width:100%;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;color:#1a1a1a;background:#fafafa;margin-bottom:1rem;outline:none}
input:focus{border-color:#555;background:#fff}
button{width:100%;padding:10px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:.25rem}
button:hover{background:#333}
.error{background:#fef2f2;border:1px solid #fca5a5;color:#b91c1c;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:1rem}
.lock{font-size:32px;margin-bottom:1rem}
</style>
</head>
<body>
<div class="card">
  <div class="lock">🔐</div>
  <h1>Finanzas Personales</h1>
  <p class="sub">Ingresa tus credenciales para continuar</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Usuario</label>
    <input type="text" name="username" autocomplete="username" required autofocus />
    <label>Contraseña</label>
    <input type="password" name="password" autocomplete="current-password" required />
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
